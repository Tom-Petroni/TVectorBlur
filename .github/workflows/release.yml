name: Release TVectorBlur

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-package:
    name: ${{ matrix.os_name }} / Nuke ${{ matrix.nuke_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: windows
            runner: [self-hosted, windows, x64, nuke, cuda]
            nuke_version: "13.0"
            nuke_root_var: NUKE_13_0_ROOT
          - os_name: windows
            runner: [self-hosted, windows, x64, nuke, cuda]
            nuke_version: "14.0"
            nuke_root_var: NUKE_14_0_ROOT
          - os_name: windows
            runner: [self-hosted, windows, x64, nuke, cuda]
            nuke_version: "15.0"
            nuke_root_var: NUKE_15_0_ROOT
          - os_name: windows
            runner: [self-hosted, windows, x64, nuke, cuda]
            nuke_version: "15.1"
            nuke_root_var: NUKE_15_1_ROOT
          - os_name: windows
            runner: [self-hosted, windows, x64, nuke, cuda]
            nuke_version: "16.0"
            nuke_root_var: NUKE_16_0_ROOT
          - os_name: windows
            runner: [self-hosted, windows, x64, nuke, cuda]
            nuke_version: "17.0"
            nuke_root_var: NUKE_17_0_ROOT
          - os_name: linux
            runner: [self-hosted, linux, x64, nuke, cuda]
            nuke_version: "13.0"
            nuke_root_var: NUKE_13_0_ROOT
          - os_name: linux
            runner: [self-hosted, linux, x64, nuke, cuda]
            nuke_version: "14.0"
            nuke_root_var: NUKE_14_0_ROOT
          - os_name: linux
            runner: [self-hosted, linux, x64, nuke, cuda]
            nuke_version: "15.0"
            nuke_root_var: NUKE_15_0_ROOT
          - os_name: linux
            runner: [self-hosted, linux, x64, nuke, cuda]
            nuke_version: "15.1"
            nuke_root_var: NUKE_15_1_ROOT
          - os_name: linux
            runner: [self-hosted, linux, x64, nuke, cuda]
            nuke_version: "16.0"
            nuke_root_var: NUKE_16_0_ROOT
          - os_name: linux
            runner: [self-hosted, linux, x64, nuke, cuda]
            nuke_version: "17.0"
            nuke_root_var: NUKE_17_0_ROOT

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve Nuke root
        shell: bash
        run: |
          VALUE="${{ vars[matrix.nuke_root_var] }}"
          if [[ -z "${VALUE}" ]]; then
            echo "BUILD_ENABLED=false" >> "${GITHUB_ENV}"
            echo "NUKE_ROOT=" >> "${GITHUB_ENV}"
            echo "Skipping Nuke ${{ matrix.nuke_version }} on ${{ matrix.os_name }} because '${{ matrix.nuke_root_var }}' is not set."
            exit 0
          fi
          echo "BUILD_ENABLED=true" >> "${GITHUB_ENV}"
          echo "NUKE_ROOT=${VALUE}" >> "${GITHUB_ENV}"

      - name: Set up Python
        if: env.BUILD_ENABLED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure and build on Windows
        if: matrix.os_name == 'windows' && env.BUILD_ENABLED == 'true'
        shell: pwsh
        run: |
          ./scripts/build_windows.ps1 -NukeRoot "$env:NUKE_ROOT" -Configuration Release

      - name: Configure and build on Linux
        if: matrix.os_name == 'linux' && env.BUILD_ENABLED == 'true'
        shell: bash
        run: |
          chmod +x ./scripts/build_linux.sh
          ./scripts/build_linux.sh "${NUKE_ROOT}" Release

      - name: Package target
        if: env.BUILD_ENABLED == 'true'
        shell: bash
        run: |
          python scripts/package_release.py --target "${{ matrix.nuke_version }}/${{ matrix.os_name }}/x86_64"

      - name: Upload release package
        if: env.BUILD_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os_name }}-nuke-${{ matrix.nuke_version }}
          path: dist/*.zip

  publish-release:
    needs: build-and-package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p dist
          find release-assets -type f -name '*.zip' -exec cp {} dist/ \;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
