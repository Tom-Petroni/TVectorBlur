# Self-hosted runner requirements:
# - labels: self-hosted, nuke, windows|linux
# - a valid Nuke license available on the runner
# - runner environment variables such as NUKE_13_0_EXECUTABLE, NUKE_17_0_EXECUTABLE, etc.
# - optional GPU/CUDA runtime on runners where enable_gpu is turned on

name: Nuke Runtime Smoke

on:
  workflow_dispatch:
    inputs:
      nuke_versions:
        description: "Comma-separated supported Nuke minor versions"
        required: false
        default: "13.0,13.1,13.2,14.0,14.1,15.0,15.1,15.2,16.0,17.0"
      include_windows:
        description: "Run on Windows self-hosted runners"
        required: false
        type: boolean
        default: true
      include_linux:
        description: "Run on Linux self-hosted runners"
        required: false
        type: boolean
        default: true
      enable_gpu:
        description: "Also execute the GPU path when the runner supports CUDA"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  profile:
    name: Resolve Build Profile
    runs-on: ubuntu-latest
    outputs:
      plugin_key: ${{ steps.profile.outputs.plugin_key }}
      supports_gpu_runtime_test: ${{ steps.profile.outputs.supports_gpu_runtime_test }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read build profile
        id: profile
        shell: pwsh
        run: |
          $profile = ./tools/Get-NukeBuildProfile.ps1 -AsJson | ConvertFrom-Json
          "plugin_key=$($profile.plugin_key)" >> $env:GITHUB_OUTPUT
          "supports_gpu_runtime_test=$($profile.supports_gpu_runtime_test.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

  matrix:
    name: Prepare Runtime Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime matrix
        id: generate
        shell: pwsh
        run: |
          $matrix = ./tools/Get-NukeBuildMatrix.ps1 -Mode runtime -SelectedVersions '${{ github.event.inputs.nuke_versions }}' -IncludeWindows:('${{ github.event.inputs.include_windows }}' -eq 'true') -IncludeLinux:('${{ github.event.inputs.include_linux }}' -eq 'true') -EnableGpu:('${{ github.event.inputs.enable_gpu }}' -eq 'true') -AsJson
          "matrix=$matrix" >> $env:GITHUB_OUTPUT

  smoke:
    name: Runtime Smoke Nuke ${{ matrix.nuke_version }} on ${{ matrix.platform_name }}
    needs:
      - matrix
      - profile
    runs-on: ${{ fromJson(matrix.runner_labels_json) }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Nuke executable on Windows
        if: matrix.platform_name == 'windows'
        id: resolve_windows
        shell: powershell
        run: |
          $versionKey = "${{ matrix.nuke_version }}".Replace('.', '_')
          $envName = "NUKE_${versionKey}_EXECUTABLE"
          $nukeExe = [Environment]::GetEnvironmentVariable($envName)
          if ([string]::IsNullOrWhiteSpace($nukeExe)) {
            throw "Missing runner environment variable: $envName"
          }
          "nuke_executable=$nukeExe" >> $env:GITHUB_OUTPUT

      - name: Resolve Nuke executable on Unix
        if: matrix.platform_name != 'windows'
        id: resolve_unix
        shell: bash
        run: |
          version_key="${{ matrix.nuke_version }}"
          version_key="${version_key//./_}"
          env_name="NUKE_${version_key}_EXECUTABLE"
          nuke_executable="${!env_name:-}"
          if [[ -z "${nuke_executable}" ]]; then
            echo "Missing runner environment variable: ${env_name}" >&2
            exit 1
          fi
          printf 'nuke_executable=%s\n' "${nuke_executable}" >> "${GITHUB_OUTPUT}"

      - name: Run runtime smoke on Windows
        if: matrix.platform_name == 'windows'
        env:
          TSUITE_NODE_CLASS: ${{ needs.profile.outputs.plugin_key }}
          TSUITE_PACKAGE_NAME: ${{ needs.profile.outputs.plugin_key }}
          TSUITE_PLUGIN_ROOT: ${{ github.workspace }}\publish
          TSUITE_ENABLE_GPU: ${{ matrix.enable_gpu && needs.profile.outputs.supports_gpu_runtime_test == 'true' && '1' || '0' }}
        shell: powershell
        run: |
          $ciHome = Join-Path $env:GITHUB_WORKSPACE ".ci-home"
          New-Item -ItemType Directory -Force -Path (Join-Path $ciHome ".nuke") | Out-Null
          $env:HOME = $ciHome
          $env:USERPROFILE = $ciHome
          $env:NUKE_PATH = Join-Path $env:GITHUB_WORKSPACE "publish"
          & "${{ steps.resolve_windows.outputs.nuke_executable }}" -t work/scripts/runtime_smoke.py

      - name: Run runtime smoke on Unix
        if: matrix.platform_name != 'windows'
        env:
          TSUITE_NODE_CLASS: ${{ needs.profile.outputs.plugin_key }}
          TSUITE_PACKAGE_NAME: ${{ needs.profile.outputs.plugin_key }}
          TSUITE_PLUGIN_ROOT: ${{ github.workspace }}/publish
          TSUITE_ENABLE_GPU: ${{ matrix.enable_gpu && needs.profile.outputs.supports_gpu_runtime_test == 'true' && '1' || '0' }}
        shell: bash
        run: |
          ci_home="${GITHUB_WORKSPACE}/.ci-home"
          mkdir -p "${ci_home}/.nuke"
          HOME="${ci_home}" \
          USERPROFILE="${ci_home}" \
          NUKE_PATH="${GITHUB_WORKSPACE}/publish" \
          "${{ steps.resolve_unix.outputs.nuke_executable }}" -t work/scripts/runtime_smoke.py
