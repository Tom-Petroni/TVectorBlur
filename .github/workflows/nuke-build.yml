name: Nuke Plugin Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      nuke_versions:
        description: "Comma-separated supported Nuke minor versions"
        required: false
        default: "13.0,13.1,13.2,14.0,14.1,15.0,15.1,15.2,16.0,17.0"
      sync_publish_binaries:
        description: "Refresh publish/TVectorBlur/bin from freshly built artifacts"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    working-directory: work

concurrency:
  group: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) && format('build-{0}-{1}', github.workflow, github.ref) || format('smoke-{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  detect_release:
    name: Detect Release Intent
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_requested: ${{ steps.detect.outputs.release_requested }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect VERSION change
        id: detect
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION must be SemVer X.Y.Z, got '$VERSION'"
            exit 1
          fi

          BEFORE_SHA="${{ github.event.before }}"
          if [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "${GITHUB_SHA}")"
          else
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}")"
          fi

          RELEASE_REQUESTED="false"
          if grep -qx 'VERSION' <<< "$CHANGED_FILES"; then
            RELEASE_REQUESTED="true"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_requested=$RELEASE_REQUESTED" >> "$GITHUB_OUTPUT"

  smoke:
    name: Smoke Checks on ${{ matrix.runner }}
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Python syntax check
        run: python -m compileall TVectorBlur scripts

      - name: Check xtask
        run: cargo check -p xtask

  matrix:
    name: Prepare Release Matrix
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || needs.detect_release.outputs.release_requested == 'true'
    needs: detect_release
    runs-on: ubuntu-latest
    outputs:
      native_build_required: ${{ steps.matrix.outputs.native_build_required }}
      has_cpu: ${{ steps.matrix.outputs.has_cpu }}
      has_cuda: ${{ steps.matrix.outputs.has_cuda }}
      cpu_matrix: ${{ steps.matrix.outputs.cpu_matrix }}
      cuda_matrix: ${{ steps.matrix.outputs.cuda_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: matrix
        shell: pwsh
        working-directory: .
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_NUKE_VERSIONS: ${{ github.event.inputs.nuke_versions }}
        run: |
          $requestedVersions = @()
          if ($env:EVENT_NAME -eq "workflow_dispatch" -and -not [string]::IsNullOrWhiteSpace($env:INPUT_NUKE_VERSIONS)) {
            $requestedVersions = $env:INPUT_NUKE_VERSIONS.Split(",") | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          }

          $matrix = ./tools/Get-NukeBuildMatrix.ps1 -RequestedVersions $requestedVersions -AsJson | ConvertFrom-Json
          "native_build_required=$($matrix.native_build_required.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "has_cpu=$($matrix.has_cpu.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "has_cuda=$($matrix.has_cuda.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "cpu_matrix=$($matrix.cpu | ConvertTo-Json -Compress -Depth 8)" >> $env:GITHUB_OUTPUT
          "cuda_matrix=$($matrix.cuda | ConvertTo-Json -Compress -Depth 8)" >> $env:GITHUB_OUTPUT

  build_cpu:
    name: Build CPU Nuke ${{ matrix.nuke_version }} on ${{ matrix.target_platform }}
    if: needs.matrix.outputs.has_cpu == 'true'
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.cpu_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space on Linux runners
        if: runner.os == 'Linux'
        shell: bash
        working-directory: .
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          sudo apt-get clean
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        if: runner.os == 'Windows'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            work -> target
            work/xtask -> target

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config p7zip-full file patchelf ca-certificates

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: powershell
        working-directory: .
        run: |
          choco install 7zip lessmsi -y

      - name: Build CPU package
        env:
          RUST_BACKTRACE: "1"
        run: cargo xtask --compile --nuke-versions "${{ matrix.nuke_version }}" --target-platform "${{ matrix.target_platform }}" --output-to-package --limit-threads

      - name: Verify expected binary exists
        shell: bash
        env:
          NUKE_VERSION: ${{ matrix.nuke_version }}
          OS_NAME: ${{ matrix.package_os }}
          ARCH_NAME: ${{ matrix.package_arch }}
          LIB_EXT: ${{ matrix.lib_ext }}
          LIB_PREFIX: ${{ matrix.lib_prefix }}
        run: |
          python - <<'PY'
          import os
          import pathlib

          expected = (
              pathlib.Path("TVectorBlur")
              / "bin"
              / os.environ["NUKE_VERSION"]
              / os.environ["OS_NAME"]
              / os.environ["ARCH_NAME"]
              / f"{os.environ['LIB_PREFIX']}TVectorBlur.{os.environ['LIB_EXT']}"
          )
          if not expected.is_file():
              raise SystemExit(f"Missing expected build output: {expected}")
          print(f"Found: {expected}")
          PY

      - name: Upload CPU artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvectorblur-${{ matrix.nuke_version }}-${{ matrix.target_platform }}-cpu
          if-no-files-found: error
          path: work/TVectorBlur/bin/${{ matrix.nuke_version }}/${{ matrix.package_os }}/${{ matrix.package_arch }}/${{ matrix.lib_prefix }}TVectorBlur.${{ matrix.lib_ext }}

  build_cuda:
    name: Build CUDA Nuke ${{ matrix.nuke_version }} on ${{ matrix.target_platform }}
    if: needs.matrix.outputs.has_cuda == 'true'
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.cuda_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space on Linux runners
        if: runner.os == 'Linux'
        shell: bash
        working-directory: .
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          sudo apt-get clean
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        if: runner.os == 'Windows'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            work -> target
            work/xtask -> target

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config p7zip-full file patchelf ca-certificates

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: powershell
        working-directory: .
        run: |
          choco install 7zip lessmsi -y

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.6.0"

      - name: Build CUDA package
        env:
          RUST_BACKTRACE: "1"
        run: cargo xtask --compile --nuke-versions "${{ matrix.nuke_version }}" --target-platform "${{ matrix.target_platform }}" --output-to-package --limit-threads --cuda-backend

      - name: Verify expected binary exists
        shell: bash
        env:
          NUKE_VERSION: ${{ matrix.nuke_version }}
          OS_NAME: ${{ matrix.package_os }}
          ARCH_NAME: ${{ matrix.package_arch }}
          LIB_EXT: ${{ matrix.lib_ext }}
          LIB_PREFIX: ${{ matrix.lib_prefix }}
        run: |
          python - <<'PY'
          import os
          import pathlib

          expected = (
              pathlib.Path("TVectorBlur")
              / "bin"
              / os.environ["NUKE_VERSION"]
              / os.environ["OS_NAME"]
              / os.environ["ARCH_NAME"]
              / f"{os.environ['LIB_PREFIX']}TVectorBlur.{os.environ['LIB_EXT']}"
          )
          if not expected.is_file():
              raise SystemExit(f"Missing expected build output: {expected}")
          print(f"Found: {expected}")
          PY

      - name: Upload CUDA artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvectorblur-${{ matrix.nuke_version }}-${{ matrix.target_platform }}-${{ matrix.backend_mode }}
          if-no-files-found: error
          path: work/TVectorBlur/bin/${{ matrix.nuke_version }}/${{ matrix.package_os }}/${{ matrix.package_arch }}/${{ matrix.lib_prefix }}TVectorBlur.${{ matrix.lib_ext }}

  bundle:
    name: Bundle Multi-Platform Package
    if: always() && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || needs.detect_release.outputs.release_requested == 'true') && needs.matrix.result == 'success' && (needs.build_cpu.result == 'success' || needs.build_cpu.result == 'skipped') && (needs.build_cuda.result == 'success' || needs.build_cuda.result == 'skipped')
    needs:
      - detect_release
      - matrix
      - build_cpu
      - build_cuda
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        if: needs.matrix.outputs.native_build_required == 'true'
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble package
        working-directory: .
        run: |
          mkdir -p package
          rsync -a publish/ package/
          rm -rf package/TVectorBlur/bin
          if [[ "${{ needs.matrix.outputs.native_build_required }}" == "true" ]]; then
            mkdir -p package/TVectorBlur/bin
            for artifact in dist/*; do
              if [[ -d "$artifact/work/TVectorBlur/bin" ]]; then
                rsync -a "$artifact/work/TVectorBlur/bin/" "package/TVectorBlur/bin/"
              elif [[ -d "$artifact/TVectorBlur/bin" ]]; then
                rsync -a "$artifact/TVectorBlur/bin/" "package/TVectorBlur/bin/"
              elif [[ -d "$artifact" ]]; then
                artifact_name="$(basename "$artifact")"
                if [[ "$artifact_name" =~ ^tvectorblur-([0-9]+\.[0-9]+)-(linux|windows)-(cpu|CUDA|Hybrid)$ ]]; then
                  version="${BASH_REMATCH[1]}"
                  os_name="${BASH_REMATCH[2]}"
                  arch_name="x86_64"
                  binary_path="$(find "$artifact" -maxdepth 5 -type f \( -name 'TVectorBlur.dll' -o -name 'libTVectorBlur.so' -o -name 'libTVectorBlur.dylib' \) | head -n 1)"
                  if [[ -n "$binary_path" ]]; then
                    mkdir -p "package/TVectorBlur/bin/${version}/${os_name}/${arch_name}"
                    cp "$binary_path" "package/TVectorBlur/bin/${version}/${os_name}/${arch_name}/"
                  fi
                fi
              fi
            done
          fi
          find package -type d -name "__pycache__" -prune -exec rm -rf {} +

      - name: Validate packaged Python loader
        if: needs.matrix.outputs.native_build_required == 'true'
        working-directory: .
        run: python work/scripts/validate_package_import.py --package-root package --package-name TVectorBlur --node-class TVectorBlur

      - name: Create zip
        id: zip
        working-directory: .
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ZIP_NAME="TVectorBlur-${GITHUB_REF_NAME}.zip"
          elif [[ "${{ needs.detect_release.outputs.release_requested }}" == "true" ]]; then
            ZIP_NAME="TVectorBlur-v${{ needs.detect_release.outputs.version }}.zip"
          else
            ZIP_NAME="TVectorBlur-${GITHUB_SHA}.zip"
          fi
          cd package
          zip -r "../${ZIP_NAME}" .
          echo "zip_name=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Resolve release metadata
        id: release_meta
        working-directory: .
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v${{ needs.detect_release.outputs.version }}"
          fi
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Upload bundled artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.zip_name }}
          if-no-files-found: error
          path: ${{ steps.zip.outputs.zip_name }}

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/') || needs.detect_release.outputs.release_requested == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: TVectorBlur ${{ steps.release_meta.outputs.release_tag }}
          files: ${{ steps.zip.outputs.zip_name }}
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  sync_publish:
    name: Sync Publish Folder To Repo
    if: always() && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.sync_publish_binaries == 'true' && needs.matrix.outputs.native_build_required == 'true' && needs.matrix.result == 'success' && (needs.build_cpu.result == 'success' || needs.build_cpu.result == 'skipped') && (needs.build_cuda.result == 'success' || needs.build_cuda.result == 'skipped')
    needs:
      - matrix
      - build_cpu
      - build_cuda
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rebuild publish binaries from artifacts
        working-directory: .
        run: |
          rm -rf publish/TVectorBlur/bin
          mkdir -p publish/TVectorBlur/bin

          for artifact in dist/*; do
            if [[ -d "$artifact/TVectorBlur/bin" ]]; then
              rsync -a "$artifact/TVectorBlur/bin/" "publish/TVectorBlur/bin/"
            elif [[ -d "$artifact" ]]; then
              artifact_name="$(basename "$artifact")"
              if [[ "$artifact_name" =~ ^tvectorblur-([0-9]+\.[0-9]+)-(linux|windows)-(cpu|CUDA|Hybrid)$ ]]; then
                version="${BASH_REMATCH[1]}"
                os_name="${BASH_REMATCH[2]}"
                arch_name="x86_64"
                binary_path="$(find "$artifact" -maxdepth 5 -type f \( -name 'TVectorBlur.dll' -o -name 'libTVectorBlur.so' -o -name 'libTVectorBlur.dylib' \) | head -n 1)"
                if [[ -n "$binary_path" ]]; then
                  mkdir -p "publish/TVectorBlur/bin/${version}/${os_name}/${arch_name}"
                  cp "$binary_path" "publish/TVectorBlur/bin/${version}/${os_name}/${arch_name}/"
                fi
              fi
            fi
          done

      - name: Commit publish updates
        working-directory: .
        run: |
          if git diff --quiet -- publish/TVectorBlur/bin; then
            echo "No publish changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publish/TVectorBlur/bin
          git commit -m "chore(publish): sync compiled binaries [skip ci]"
          git push origin HEAD:main
