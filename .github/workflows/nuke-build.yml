name: Nuke Plugin Build (CUDA)

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      nuke_versions:
        description: "Comma-separated supported Nuke minor versions"
        required: false
        default: "13.0,13.1,13.2,14.0,14.1,15.0,15.1,15.2,16.0,17.0"
      cuda_backend:
        description: "Build CUDA backend binaries"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: work

concurrency:
  group: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) && format('build-{0}-{1}', github.workflow, github.ref) || format('smoke-{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Checks on ${{ matrix.runner }}
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            work -> target

      - name: Python syntax check
        run: python -m compileall init.py TVectorBlur scripts xtask

      - name: Check xtask
        run: cargo check -p xtask

  matrix:
    name: Prepare Release Matrix
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: generate
        working-directory: .
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_NUKE_VERSIONS: ${{ github.event.inputs.nuke_versions }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          supported_versions = ["13.0", "13.1", "13.2", "14.0", "14.1", "15.0", "15.1", "15.2", "16.0", "17.0"]

          def parse_versions(raw: str):
              if not raw:
                  return []
              return [version.strip() for version in raw.split(",") if version.strip()]

          event_name = os.getenv("EVENT_NAME", "")
          if event_name == "workflow_dispatch":
              versions = parse_versions(os.getenv("INPUT_NUKE_VERSIONS", "")) or supported_versions
          else:
              versions = supported_versions

          unsupported = [version for version in versions if version not in supported_versions]
          if unsupported:
              print("Unsupported Nuke versions requested: {}".format(", ".join(unsupported)), file=sys.stderr)
              sys.exit(1)

          targets = [
              {
                  "runner": "ubuntu-latest",
                  "target_platform": "linux",
                  "os_name": "linux",
                  "lib_ext": "so",
              },
              {
                  "runner": "windows-latest",
                  "target_platform": "windows",
                  "os_name": "windows",
                  "lib_ext": "dll",
              },
          ]

          include = []
          for version in versions:
              for target in targets:
                  row = dict(target)
                  row["nuke_version"] = version
                  include.append(row)

          matrix = {"include": include}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write("matrix={}\n".format(json.dumps(matrix)))

          print(json.dumps(matrix))
          PY

  build:
    name: Build Nuke ${{ matrix.nuke_version }} on ${{ matrix.target_platform }}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            work -> target

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install 7zip lessmsi -y

      - name: Install CUDA toolkit
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.cuda_backend == 'true'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.4.1"

      - name: Build and package plugin
        shell: bash
        env:
          RUST_BACKTRACE: "1"
          TVECTORBLUR_CUDA_ARCHITECTURES: "75;86;89;90"
          USE_CUDA: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.cuda_backend == 'true' }}
        run: |
          python - <<'PY'
          import os
          import subprocess

          command = [
              "cargo",
              "xtask",
              "--compile",
              "--nuke-versions",
              "${{ matrix.nuke_version }}",
              "--target-platform",
              "${{ matrix.target_platform }}",
              "--output-to-package",
              "--limit-threads",
          ]

          if os.environ.get("USE_CUDA", "true").lower() != "true":
              raise SystemExit("TVectorBlur requires the CUDA backend for hosted CI builds.")

          print("Running:", " ".join(command))
          subprocess.check_call(command)
          PY

      - name: Verify expected binary exists
        shell: bash
        env:
          NUKE_VERSION: ${{ matrix.nuke_version }}
          OS_NAME: ${{ matrix.os_name }}
          LIB_EXT: ${{ matrix.lib_ext }}
        run: |
          python - <<'PY'
          import os
          import pathlib

          expected = (
              pathlib.Path("TVectorBlur")
              / "bin"
              / os.environ["NUKE_VERSION"]
              / os.environ["OS_NAME"]
              / f"TVectorBlur.{os.environ['LIB_EXT']}"
          )
          if not expected.is_file():
              raise SystemExit(f"Missing expected build output: {expected}")
          print(f"Found: {expected}")
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvectorblur-${{ matrix.nuke_version }}-${{ matrix.target_platform }}
          if-no-files-found: error
          path: |
            work/README.md
            work/init.py
            work/TVectorBlur/*.py
            work/TVectorBlur/resources/*
            work/TVectorBlur/bin/${{ matrix.nuke_version }}/${{ matrix.os_name }}/TVectorBlur.${{ matrix.lib_ext }}

  bundle:
    name: Bundle Multi-Platform Package
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble package
        working-directory: .
        run: |
          rm -rf package
          mkdir -p package
          cp -R publish/. package/
          for artifact in dist/*; do
            if [[ -d "$artifact/TVectorBlur/bin" ]]; then
              rsync -a "$artifact/TVectorBlur/bin/" "package/TVectorBlur/bin/"
            fi
          done
          find package -type d -name "__pycache__" -prune -exec rm -rf {} +

      - name: Create zip
        id: zip
        working-directory: .
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ZIP_NAME="TVectorBlur-${GITHUB_REF_NAME}.zip"
          else
            ZIP_NAME="TVectorBlur-${GITHUB_SHA}.zip"
          fi
          cd package
          zip -r "../${ZIP_NAME}" .
          echo "zip_name=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload bundled artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.zip_name }}
          if-no-files-found: error
          path: ${{ steps.zip.outputs.zip_name }}

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TVectorBlur ${{ github.ref_name }}
          files: ${{ steps.zip.outputs.zip_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  sync_publish:
    name: Sync Publish Folder To Repo
    if: (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rebuild publish binaries from artifacts
        working-directory: .
        run: |
          rm -rf publish/TVectorBlur/bin
          mkdir -p publish/TVectorBlur/bin
          for artifact in dist/*; do
            if [[ -d "$artifact/TVectorBlur/bin" ]]; then
              rsync -a "$artifact/TVectorBlur/bin/" "publish/TVectorBlur/bin/"
            fi
          done

      - name: Commit publish updates
        working-directory: .
        run: |
          if git diff --quiet -- publish/TVectorBlur/bin; then
            echo "No publish changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publish/TVectorBlur/bin
          git commit -m "chore(publish): sync compiled binaries [skip ci]"
          git push origin HEAD:main
