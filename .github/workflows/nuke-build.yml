name: Nuke Plugin Build (CUDA)

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      nuke_versions:
        description: "Comma-separated supported Nuke minor versions"
        required: false
        default: "13.0,14.0,15.0,16.0,17.0"

permissions:
  contents: read

defaults:
  run:
    working-directory: work

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Checks on ${{ matrix.runner }}
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python syntax check
        run: python -m compileall init.py TVectorBlur scripts

  matrix:
    name: Prepare Release Matrix
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: generate
        working-directory: .
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_NUKE_VERSIONS: ${{ github.event.inputs.nuke_versions }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          supported_versions = ["13.0", "14.0", "15.0", "16.0", "17.0"]

          def parse_versions(raw: str):
              if not raw:
                  return []
              return [version.strip() for version in raw.split(",") if version.strip()]

          event_name = os.getenv("EVENT_NAME", "")
          versions = parse_versions(os.getenv("INPUT_NUKE_VERSIONS", ""))
          if event_name != "workflow_dispatch" or not versions:
              versions = supported_versions

          unsupported = [version for version in versions if version not in supported_versions]
          if unsupported:
              print("Unsupported Nuke versions requested: {}".format(", ".join(unsupported)), file=sys.stderr)
              sys.exit(1)

          targets = [
              {
                  "runner_labels": ["self-hosted", "nuke", "linux"],
                  "target_platform": "linux",
                  "os_name": "linux",
                  "lib_ext": "so",
              },
              {
                  "runner_labels": ["self-hosted", "nuke", "windows"],
                  "target_platform": "windows",
                  "os_name": "windows",
                  "lib_ext": "dll",
              },
          ]

          include = []
          for version in versions:
              for target in targets:
                  row = dict(target)
                  row["nuke_version"] = version
                  include.append(row)

          matrix = {"include": include}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write("matrix={}\n".format(json.dumps(matrix)))
          print(json.dumps(matrix))
          PY

  build:
    name: Build Nuke ${{ matrix.nuke_version }} on ${{ matrix.target_platform }}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: matrix
    runs-on: ${{ fromJson(toJson(matrix.runner_labels)) }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build enable flag
        id: enabled
        shell: bash
        run: |
          if [[ "${{ matrix.target_platform }}" == "linux" && "${{ vars.ENABLE_LINUX_BUILDS }}" != "true" ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [[ "${{ matrix.target_platform }}" == "windows" && "${{ vars.ENABLE_WINDOWS_BUILDS }}" == "false" ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "enabled=true" >> "${GITHUB_OUTPUT}"

      - name: Resolve Nuke root
        if: steps.enabled.outputs.enabled == 'true'
        id: nuke_root
        shell: bash
        run: |
          case "${{ matrix.nuke_version }}" in
            13.0) value="${{ vars.NUKE_13_0_ROOT }}" ;;
            14.0) value="${{ vars.NUKE_14_0_ROOT }}" ;;
            15.0) value="${{ vars.NUKE_15_0_ROOT }}" ;;
            16.0) value="${{ vars.NUKE_16_0_ROOT }}" ;;
            17.0) value="${{ vars.NUKE_17_0_ROOT }}" ;;
            *) value="" ;;
          esac
          if [[ -z "${value}" ]]; then
            echo "Missing repository variable for Nuke ${{ matrix.nuke_version }}" >&2
            exit 1
          fi
          printf 'path=%s\n' "${value}" >> "${GITHUB_OUTPUT}"

      - name: Build on Windows
        if: steps.enabled.outputs.enabled == 'true' && matrix.target_platform == 'windows'
        shell: pwsh
        run: |
          ./scripts/build_windows.ps1 -NukeRoot "${{ steps.nuke_root.outputs.path }}" -Configuration Release

      - name: Build on Linux
        if: steps.enabled.outputs.enabled == 'true' && matrix.target_platform == 'linux'
        shell: bash
        run: |
          chmod +x ./scripts/build_linux.sh
          ./scripts/build_linux.sh "${{ steps.nuke_root.outputs.path }}" Release

      - name: Verify expected binary exists
        if: steps.enabled.outputs.enabled == 'true'
        shell: bash
        env:
          NUKE_VERSION: ${{ matrix.nuke_version }}
          OS_NAME: ${{ matrix.os_name }}
          LIB_EXT: ${{ matrix.lib_ext }}
        run: |
          python - <<'PY'
          import os
          import pathlib

          expected = (
              pathlib.Path("TVectorBlur")
              / "bin"
              / os.environ["NUKE_VERSION"]
              / os.environ["OS_NAME"]
              / f"TVectorBlur.{os.environ['LIB_EXT']}"
          )
          if not expected.is_file():
              raise SystemExit(f"Missing expected build output: {expected}")
          print(f"Found: {expected}")
          PY

      - name: Upload build artifact
        if: steps.enabled.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tvectorblur-${{ matrix.nuke_version }}-${{ matrix.target_platform }}
          if-no-files-found: error
          path: |
            work/init.py
            work/TVectorBlur/*.py
            work/TVectorBlur/resources/*
            work/TVectorBlur/bin/${{ matrix.nuke_version }}/${{ matrix.os_name }}/TVectorBlur.${{ matrix.lib_ext }}

  bundle:
    name: Bundle Multi-Platform Package
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble package
        working-directory: .
        run: |
          rm -rf package
          mkdir -p package
          cp -R publish/. package/
          for artifact in dist/*; do
            if [[ -d "$artifact/TVectorBlur/bin" ]]; then
              rsync -a "$artifact/TVectorBlur/bin/" "package/TVectorBlur/bin/"
            fi
          done
          find package -type d -name "__pycache__" -prune -exec rm -rf {} +

      - name: Create zip
        id: zip
        working-directory: .
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ZIP_NAME="TVectorBlur-${GITHUB_REF_NAME}.zip"
          else
            ZIP_NAME="TVectorBlur-${GITHUB_SHA}.zip"
          fi
          cd package
          zip -r "../${ZIP_NAME}" .
          echo "zip_name=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload bundled artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.zip_name }}
          if-no-files-found: error
          path: ${{ steps.zip.outputs.zip_name }}

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TVectorBlur ${{ github.ref_name }}
          files: ${{ steps.zip.outputs.zip_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  sync_publish:
    name: Sync Publish Folder To Repo
    if: (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rebuild publish binaries from artifacts
        working-directory: .
        run: |
          rm -rf publish/TVectorBlur/bin
          mkdir -p publish/TVectorBlur/bin
          for artifact in dist/*; do
            if [[ -d "$artifact/TVectorBlur/bin" ]]; then
              rsync -a "$artifact/TVectorBlur/bin/" "publish/TVectorBlur/bin/"
            fi
          done

      - name: Commit publish updates
        working-directory: .
        run: |
          if git diff --quiet -- publish/TVectorBlur/bin; then
            echo "No publish changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publish/TVectorBlur/bin
          git commit -m "chore(publish): sync compiled binaries [skip ci]"
          git push origin HEAD:main
