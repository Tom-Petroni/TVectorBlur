name: Build TVectorBlur

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    if: |
      (matrix.os_name != 'linux' || vars.ENABLE_LINUX_BUILDS == 'true') &&
      (matrix.os_name != 'windows' || vars.ENABLE_WINDOWS_BUILDS != 'false')
    name: ${{ matrix.os_name }} / Nuke ${{ matrix.nuke_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: windows
            runner: [self-hosted, windows, x64, nuke, cuda]
            nuke_version: "13.0"
            nuke_root_var: NUKE_13_0_ROOT
          - os_name: windows
            runner: [self-hosted, windows, x64, nuke, cuda]
            nuke_version: "14.0"
            nuke_root_var: NUKE_14_0_ROOT
          - os_name: windows
            runner: [self-hosted, windows, x64, nuke, cuda]
            nuke_version: "15.0"
            nuke_root_var: NUKE_15_0_ROOT
          - os_name: windows
            runner: [self-hosted, windows, x64, nuke, cuda]
            nuke_version: "15.1"
            nuke_root_var: NUKE_15_1_ROOT
          - os_name: windows
            runner: [self-hosted, windows, x64, nuke, cuda]
            nuke_version: "16.0"
            nuke_root_var: NUKE_16_0_ROOT
          - os_name: windows
            runner: [self-hosted, windows, x64, nuke, cuda]
            nuke_version: "17.0"
            nuke_root_var: NUKE_17_0_ROOT
          - os_name: linux
            runner: [self-hosted, linux, x64, nuke, cuda]
            nuke_version: "13.0"
            nuke_root_var: NUKE_13_0_ROOT
          - os_name: linux
            runner: [self-hosted, linux, x64, nuke, cuda]
            nuke_version: "14.0"
            nuke_root_var: NUKE_14_0_ROOT
          - os_name: linux
            runner: [self-hosted, linux, x64, nuke, cuda]
            nuke_version: "15.0"
            nuke_root_var: NUKE_15_0_ROOT
          - os_name: linux
            runner: [self-hosted, linux, x64, nuke, cuda]
            nuke_version: "15.1"
            nuke_root_var: NUKE_15_1_ROOT
          - os_name: linux
            runner: [self-hosted, linux, x64, nuke, cuda]
            nuke_version: "16.0"
            nuke_root_var: NUKE_16_0_ROOT
          - os_name: linux
            runner: [self-hosted, linux, x64, nuke, cuda]
            nuke_version: "17.0"
            nuke_root_var: NUKE_17_0_ROOT

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve Nuke root
        shell: bash
        run: |
          VALUE="${{ vars[matrix.nuke_root_var] }}"
          if [[ -z "${VALUE}" ]]; then
            echo "BUILD_ENABLED=false" >> "${GITHUB_ENV}"
            echo "NUKE_ROOT=" >> "${GITHUB_ENV}"
            echo "Skipping Nuke ${{ matrix.nuke_version }} on ${{ matrix.os_name }} because '${{ matrix.nuke_root_var }}' is not set."
            exit 0
          fi
          echo "BUILD_ENABLED=true" >> "${GITHUB_ENV}"
          echo "NUKE_ROOT=${VALUE}" >> "${GITHUB_ENV}"

      - name: Configure and build on Windows
        if: matrix.os_name == 'windows' && env.BUILD_ENABLED == 'true'
        shell: pwsh
        run: |
          ./scripts/build_windows.ps1 -NukeRoot "$env:NUKE_ROOT" -Configuration Release

      - name: Configure and build on Linux
        if: matrix.os_name == 'linux' && env.BUILD_ENABLED == 'true'
        shell: bash
        run: |
          chmod +x ./scripts/build_linux.sh
          ./scripts/build_linux.sh "${NUKE_ROOT}" Release

      - name: Upload binaries
        if: env.BUILD_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: TVectorBlur-${{ matrix.os_name }}-nuke-${{ matrix.nuke_version }}
          path: |
            bin/${{ matrix.nuke_version }}/${{ matrix.os_name }}/
